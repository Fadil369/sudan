name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build React Frontend ────────────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build:production
        env:
          CI: false
          VITE_BASE_PATH: '/'
          VITE_OID_ROOT: '1.3.6.1.4.1.61026'
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://api.sudan.elfadil.com' }}
          VITE_APP_VERSION: '1.0.0'
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist/
          retention-days: 1

  # ── Deploy Frontend to Cloudflare Pages ─────────────────────────────────────
  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies (provides pinned wrangler)
        run: npm ci --legacy-peer-deps

      - name: Validate Cloudflare credentials
        run: |
          test -n "${CLOUDFLARE_API_TOKEN}" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "${CLOUDFLARE_ACCOUNT_ID}" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -o pipefail
          npx wrangler pages deploy dist \
            --project-name="${CF_PAGES_PROJECT}" \
            --branch="${DEPLOY_BRANCH}" \
            --commit-hash="${{ github.sha }}" \
            2>&1 | tee "${RUNNER_TEMP}/cf-pages-output.txt"
          URL=$(grep -oP 'https://[^\s]+\.pages\.dev' "${RUNNER_TEMP}/cf-pages-output.txt" | head -1 || true)
          echo "deployment-url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT || 'sudan-gov' }}
          DEPLOY_BRANCH: ${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '🚀 **Cloudflare Pages preview deployed!**',
                '',
                `🔗 **Preview URL**: ${url}`,
                '',
                `_Commit: \`${{ github.sha }}\`_`,
              ].join('\n'),
            });

  # ── Deploy API Worker to Cloudflare Workers ──────────────────────────────────
  deploy-worker:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies (provides pinned wrangler)
        run: npm ci --legacy-peer-deps

      - name: Deploy Worker to production
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy --config workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker to staging (PR preview)
        if: github.event_name == 'pull_request'
        run: npx wrangler deploy --config workers.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations (production only)
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          echo "Applying migration 001_initial to sudan-gov-main..."
          npx wrangler d1 execute sudan-gov-main --config workers.toml --file=./database/migrations/001_initial.sql --remote
          echo "Applying migration 002_analytics to brainsait-unified-api..."
          npx wrangler d1 execute brainsait-unified-api --config workers.toml --file=./database/migrations/002_analytics.sql --remote
          echo "Applying migration 003_users to sudan-gov-main..."
          npx wrangler d1 execute sudan-gov-main --config workers.toml --file=./database/migrations/003_users.sql --remote
          echo "All D1 migrations applied successfully."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Post-deploy health check ─────────────────────────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-worker]
    if: github.ref == 'refs/heads/main'
    permissions: {}
    steps:
      - name: Check pages deployment
        run: |
          sleep 30
          curl -f https://sudan.elfadil.com/ || echo "Pages not ready yet"

      - name: Check worker API
        run: |
          curl -f https://api.sudan.elfadil.com/api/health \
            || curl -f https://sudan-gov-api.brainsait-fadil.workers.dev/api/health \
            || echo "Worker API not reachable via custom domain yet — check DNS for api.sudan.elfadil.com"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Target | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare Pages | https://sudan.elfadil.com | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CF Pages (direct) | https://sudan-gov.pages.dev | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CF Worker (workers.dev) | https://sudan-gov-api.brainsait-fadil.workers.dev | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| CF Worker (custom) | https://api.sudan.elfadil.com | ⚠️ DNS required |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` | - |" >> $GITHUB_STEP_SUMMARY
