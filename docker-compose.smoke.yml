services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-sudanredis2024}
    volumes:
      - smoke_redis_data:/data
    networks:
      - smoke-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sudan_identity}
      POSTGRES_USER: ${POSTGRES_USER:-sudan_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SudanDB2024!}
    ports:
      - "5432:5432"
    volumes:
      - smoke_postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smoke-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sudan_admin} -d ${POSTGRES_DB:-sudan_identity}"]
      interval: 30s
      timeout: 10s
      retries: 3

  identity-service:
    build:
      context: ./backend/identity-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OID_ROOT=${OID_ROOT:-1.3.6.1.4.1.61026}
      - OID_SERVICE_URL=http://oid-service:3002
      - OID_SERVICE_TIMEOUT_MS=${OID_SERVICE_TIMEOUT_MS:-5000}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-sudan_identity}
      - POSTGRES_USER=${POSTGRES_USER:-sudan_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SudanDB2024!}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sudanredis2024}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-sgdus-identity-secret}
    depends_on:
      - redis
      - postgres
    networks:
      - smoke-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  oid-service:
    build:
      context: ./backend/oid-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OID_ROOT=${OID_ROOT:-1.3.6.1.4.1.61026}
      - CACHE_TTL_SECONDS=${OID_CACHE_TTL_SECONDS:-3600}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-sudan_identity}
      - POSTGRES_USER=${POSTGRES_USER:-sudan_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SudanDB2024!}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-sudanredis2024}@redis:6379
    depends_on:
      - redis
      - postgres
    networks:
      - smoke-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  smoke-network:
    driver: bridge

volumes:
  smoke_postgres_data:
  smoke_redis_data: